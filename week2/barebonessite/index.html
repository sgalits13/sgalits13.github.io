<!doctype html>
<html>
  <head>
    <title>MEOW!</title>
  </head>

  <body style="background-color: pink; color: brown; font-family: Arial">
    <h1 style="color: brown; text-align: center; font-family: Arial">
      you are entering CAT CITY!
    </h1>

    <img src="./cat-city.jpg" style="width: 100%" />

    <section class="pet">
      <h2 style="color: brown; text-align: center; font-family: Arial">
        SO MANY CATS!
      </h2>

      <label id="options" for="petting-cats">
        WHICH CAT ARE YOU PETTING FIRST?
      </label>

      <select id="petting-cats">
        <option value="orange-one">the orange one</option>
        <option value="other-orange-one">the other orange one</option>
        <option value="other-other-orange-one">
          the other other orange one
        </option>
        <option value="that-orange-one">
          that other orange one, in the back
        </option>
        <option value="calico">the calico</option>
      </select>
    </section>

    <div>&nbsp;</div>

    <section class="buttons">
      <button id="loser-button"><a href="./home.html">TAKE ME HOME</a></button>
      <div>&nbsp;</div>
      <button id="evil-button">set everything on FIRE!</button>
    </section>
  </body>
</html>
