<!doctype html>
<html>
  <head>
    <title>SOME COOL POKEMON</title>
  </head>

  <body class="battle" style="background-color: bisque; font-family: monospace">
    <h1 id="zubat">A WILD ZUBAT APPEARS</h1>
    <section class="bat">
      <img src="./assets/bat.png" />
      <h3>10/10 HP</h3>
    </section>
    <div style="background-color: green">&nbsp;</div>
    <section class="ray">
      <img src="./assets/ray-back.png" />
      <ol>
        <li><button>FIGHT</button></li>
        <li>
          <label id="item" for="item-select">ITEM</label>
          <select id="item-select">
            <option value="berries">BERRY</option>
            <option value="lemonade">SODA</option>
          </select>
        </li>
        <li><button>SWITCH</button></li>
        <li><button>FLEE</button></li>
      </ol>
    </section>
  </body>
</html>
