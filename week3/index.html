<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CONTROL // 2019</title>
    <style>
      /* selector {
        
        properties: value;
        
        }
        for example:
        car-seat {
            textile-type: leather;
            color: brown;
            stitching: white;
        }*/

      * {
        --button-bg: #0b0d0c;
        --button-border: #35393a;
        --button-hover: #e7e7e7;
        --control-red: rgb(182, 33, 33);
      }
      /* element */

      body {
        background-color: slategray;
        background: url("./assets/images.steamusercontent.jpg");
        padding: 95px;
      }

      /* class

        .class-name{} */

      .return {
        background-color: white;
      }

      /* id
        #id-name {} */

      #logo {
        margin-bottom: 185px;
      }

      #logo img {
        width: 256px;
      }

      nav {
        color: red;
      }

      .return span {
        background-color: black;
        color: white;
      }

      .nav-group {
        margin-bottom: 200px;
      }

      .nav-group li {
        background-color: var(--button-bg);
      }
    </style>
  </head>
  <body>
    <!--LOGO SECTION-->

    <div id="logo"><img src="./assets/Control_video_game_logo.svg.png" /></div>

    <!--CREATE THE BUTTON GROUPS-->

    <nav class="nav-class">
      <ul class="nav-group">
        <li>Continue Game <span id="A">A</span></li>
        <li>New Game</li>
        <li>Mission Select</li>
        <li>Options</li>
        <li>Credits</li>
      </ul>
    </nav>

    <!--DIV IS A CONTAINER-->
    <div class="return">
      <span>B</span> Return to Title Screen <span>@</span>
    </div>
    <footer class="footer">
      <h2>Credits</h2>
      <ul>
        <li>
          Background Image:
          <a
            href="https://steamcommunity.com/workshop/filedetails/?id=1876581064"
            >Steam Community</a
          >
        </li>
      </ul>
    </footer>
  </body>
</html>
